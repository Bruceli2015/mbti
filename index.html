<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI 专业性格测试 | 随机100题版</title>
    <style>
        /* 全局样式重置 & 基础配置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-gradient: linear-gradient(135deg, #f0f4ff 0%, #fdf2f8 100%);
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-gray: #6b7280;
            --shadow: 0 8px 32px rgba(99, 102, 241, 0.15);
            --shadow-hover: 0 12px 40px rgba(99, 102, 241, 0.25);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 页面模块 默认隐藏 */
        .page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 首页样式 */
        .home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }

        .home-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 60px 40px;
            max-width: 700px;
            width: 100%;
            transition: var(--transition);
        }

        .home-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
        }

        .home-title {
            font-size: 42px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 20px;
        }

        .home-desc {
            font-size: 18px;
            color: var(--text-gray);
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .tip-text {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn-default {
            background: #f3f4f6;
            color: var(--text-main);
        }

        .btn-default:hover {
            background: #e5e7eb;
        }

        /* 答题页样式 */
        .quiz-page {
            padding: 40px 0;
        }

        .quiz-header {
            margin-bottom: 30px;
        }

        .progress-box {
            background: #e5e7eb;
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-gray);
        }

        .quiz-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px;
        }

        .question-num {
            font-size: 16px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .question-title {
            font-size: 22px;
            margin-bottom: 36px;
            font-weight: 500;
        }

        .options-list {
            display: grid;
            gap: 16px;
        }

        .option-item {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 17px;
        }

        .option-item:hover {
            border-color: var(--primary-light);
            background: #f8faff;
        }

        .option-item.active {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        /* 结果页样式 */
        .result-page {
            padding: 40px 0;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 50px 40px;
        }

        .result-type {
            font-size: 60px;
            font-weight: 800;
            color: var(--primary-dark);
            text-align: center;
            margin-bottom: 20px;
        }

        .result-name {
            font-size: 24px;
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 40px;
        }

        .dimension-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .dimension-item {
            background: #f8faff;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .dim-title {
            font-size: 16px;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .dim-value {
            font-size: 22px;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .analysis-block {
            margin: 30px 0;
        }

        .analysis-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 4px solid var(--primary);
        }

        .analysis-content {
            font-size: 16px;
            color: var(--text-main);
            line-height: 1.9;
        }

        /* 响应式适配 手机端 */
        @media (max-width: 768px) {
            .home-title {
                font-size: 28px;
            }
            .home-card, .quiz-card, .result-card {
                padding: 30px 20px;
            }
            .result-type {
                font-size: 40px;
            }
            .question-title {
                font-size: 18px;
            }
            .btn {
                padding: 14px 32px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页页面 -->
        <div class="page active" id="homePage">
            <div class="home-page">
                <div class="home-card">
                    <h1 class="home-title">MBTI 专业性格测试</h1>
                    <p class="home-desc">题库总量10000道，每次随机抽取100题作答，凭第一直觉选择，获取精准人格分析。</p>
                    <p class="tip-text">温馨提示：答案无好坏之分，请放松心态认真作答</p>
                    <button class="btn btn-primary" id="startBtn">开始测试</button>
                </div>
            </div>
        </div>

        <!-- 答题页面 -->
        <div class="page" id="quizPage">
            <div class="quiz-page">
                <div class="quiz-header">
                    <div class="progress-box">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="progress-text">
                        <span>已完成：<span id="nowNum">0</span> / 100</span>
                        <span>进度：<span id="progressPercent">0%</span></span>
                    </div>
                </div>

                <div class="quiz-card">
                    <div class="question-num" id="questionNum">第 1 题</div>
                    <h3 class="question-title" id="questionTitle"></h3>
                    <div class="options-list" id="optionsList"></div>

                    <div class="btn-group">
                        <button class="btn btn-default" id="prevBtn" disabled>上一题</button>
                        <button class="btn btn-primary" id="nextBtn">下一题</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果页面 -->
        <div class="page" id="resultPage">
            <div class="result-page">
                <div class="result-card">
                    <div class="result-type" id="mbtiType">----</div>
                    <div class="result-name" id="typeName">人格名称</div>

                    <div class="dimension-box">
                        <div class="dimension-item">
                            <div class="dim-title">精力来源</div>
                            <div class="dim-value" id="dimEI">E / I</div>
                        </div>
                        <div class="dimension-item">
                            <div class="dim-title">认知方式</div>
                            <div class="dim-value" id="dimSN">S / N</div>
                        </div>
                        <div class="dimension-item">
                            <div class="dim-title">决策方式</div>
                            <div class="dim-value" id="dimTF">T / F</div>
                        </div>
                        <div class="dimension-item">
                            <div class="dim-title">生活态度</div>
                            <div class="dim-value" id="dimJP">J / P</div>
                        </div>
                    </div>

                    <div class="analysis-block">
                        <h4 class="analysis-title">人格整体解读</h4>
                        <div class="analysis-content" id="totalAnalysis"></div>
                    </div>
                    <div class="analysis-block">
                        <h4 class="analysis-title">性格优势</h4>
                        <div class="analysis-content" id="advantageAnalysis"></div>
                    </div>
                    <div class="analysis-block">
                        <h4 class="analysis-title">潜在短板</h4>
                        <div class="analysis-content" id="weakAnalysis"></div>
                    </div>
                    <div class="analysis-block">
                        <h4 class="analysis-title">适配方向（职业/社交）</h4>
                        <div class="analysis-content" id="fitAnalysis"></div>
                    </div>

                    <div class="btn-group" style="margin-top: 50px;">
                        <button class="btn btn-primary" id="restartBtn">重新测试</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局配置
        const NEED_QUESTION = 100; // 每次抽取100题
        let currentIndex = 0;
        let userAnswers = [];
        let randomQuestionList = []; // 本次随机选中的100题

        // DOM
        const homePage = document.getElementById('homePage');
        const quizPage = document.getElementById('quizPage');
        const resultPage = document.getElementById('resultPage');
        const startBtn = document.getElementById('startBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const questionNum = document.getElementById('questionNum');
        const questionTitle = document.getElementById('questionTitle');
        const optionsList = document.getElementById('optionsList');
        const progressBar = document.getElementById('progressBar');
        const nowNum = document.getElementById('nowNum');
        const progressPercent = document.getElementById('progressPercent');

        // ====================== 10000 道超大题库 ======================
        const fullQuestionBank = [];
        const typeArr = ["EI", "SN", "TF", "JP"];
        const baseQuestions = [
            // EI 内外向模板
            {t:"EI", q:"聚会结束后你更倾向于？", o:["意犹未尽，继续聊天","稍感疲惫，想安静一会","热闹但不想主动搭话","只想立刻独处"]},
            {t:"EI", q:"周末空闲你会优先？", o:["邀约朋友外出","宅家独自放松","偶尔小聚，多数独处","拒绝一切外出邀约"]},
            {t:"EI", q:"遇到烦恼你习惯？", o:["找人倾诉释放情绪","自我消化不愿多说","只和极少数人分享","封闭内心不交流"]},
            {t:"EI", q:"身处陌生环境你会？", o:["主动结识新朋友","被动等待他人搭话","默默观察不互动","刻意远离人群"]},
            {t:"EI", q:"日常说话风格偏向？", o:["乐于表达，滔滔不绝","言简意赅，深思后说","话少，倾听为主","几乎不主动发言"]},
            {t:"EI", q:"团队工作中更喜欢？", o:["多人协作高频沟通","独立完成减少交流","小范围配合即可","全程独自工作"]},
            {t:"EI", q:"他人对你的印象多是？", o:["开朗热情外向健谈","安静内敛不善言辞","动静结合两面性","高冷有距离感"]},
            {t:"EI", q:"灵感想法大多来自？", o:["与人讨论碰撞思路","独自静心思考","半交流半独处思考","独处才能产生想法"]},
            {t:"EI", q:"公开场合发言你会？", o:["从容享受表达自我","紧张但可以完成","尽量推脱回避","坚决拒绝上台"]},
            {t:"EI", q:"情绪低落时希望？", o:["有人陪伴安慰开导","一个人安静平复","短暂陪伴即可","拒绝任何人打扰"]},
            // SN 实感/直觉模板
            {t:"SN", q:"看待事物你更关注？", o:["客观事实与细节","未来可能性与想象","兼顾现实与畅想","优先脑洞与灵感"]},
            {t:"SN", q:"阅读书籍偏好？", o:["纪实、实用、传记类","科幻、哲理、幻想类","通俗故事读物","抽象思辨类书籍"]},
            {t:"SN", q:"描述一件事情你会？", o:["细致讲解过程细节","概括整体与深层含义","只讲核心重点","延伸大量联想内容"]},
            {t:"SN", q:"做计划更依赖？", o:["过往实际经验案例","直觉预判未来趋势","参考他人方案","凭灵感临时安排"]},
            {t:"SN", q:"理解新事物先关注？", o:["实际用途落地效果","内在逻辑潜在价值","表面现象即可","深层延伸解读"]},
            {t:"SN", q:"听他人讲话你留意？", o:["字面具体内容信息","言外之意与暗示","语气情绪状态","背后隐藏想法"]},
            {t:"SN", q:"创意主要来源于？", o:["现实生活观察总结","大脑突发灵感想象","改造现有事物","天马行空的构想"]},
            {t:"SN", q:"完成任务你看重？", o:["执行步骤与流程细节","最终目标与发展方向","完成结果即可","创新变通方式"]},
            {t:"SN", q:"回忆往事你记得？", o:["场景画面具体细节","整体感受与印象氛围","大概经过脉络","联想衍生其他事情"]},
            {t:"SN", q:"选择工作更看重？", o:["稳定务实落地性强","发展潜力创新性强","薪资待遇高低","自由创作空间"]},
            // TF 思考/情感模板
            {t:"TF", q:"做决定优先依据？", o:["客观逻辑利弊分析","他人情绪与人情感受","情理综合考量","优先照顾他人心情"]},
            {t:"TF", q:"朋友发生争执你会？", o:["理性分析对错根源","安抚双方情绪感受","中立旁观不介入","共情弱势一方"]},
            {t:"TF", q:"评价他人依靠？", o:["能力行为客观表现","性格相处主观感受","第一表面印象","个人喜好好感度"]},
            {t:"TF", q:"被批评时你的反应？", o:["理性反思问题对错","内心委屈情绪波动","表面接受内心抵触","难过许久无法释怀"]},
            {t:"TF", q:"制定规则偏向？", o:["公平公正一视同仁","灵活变通兼顾人情","规则为主偶尔变通","人情优先弱化规则"]},
            {t:"TF", q:"拒绝他人请求时？", o:["直接说明理由拒绝","委婉顾及对方感受","拖延不愿直面拒绝","不忍心拒绝任何人"]},
            {t:"TF", q:"化解团队矛盾你会？", o:["理清根源解决问题","调和氛围安抚情绪","回避矛盾不处理","优先安抚双方情绪"]},
            {t:"TF", q:"选择搭档看重？", o:["工作能力执行效率","相处氛围人品性格","配合默契即可","相处开心最重要"]},
            {t:"TF", q:"如何看待善意谎言？", o:["谎言不分性质不应存在","善意谎言可以理解接受","分场景区别看待","完全认同善意谎言"]},
            {t:"TF", q:"安慰别人的方式？", o:["分析问题给出方案","陪伴倾听共情情绪","简单口头劝解","全身心共情安抚"]},
            // JP 判断/感知模板
            {t:"JP", q:"日常生活更喜欢？", o:["规律有序计划明确","随性自由随机应变","大体有简单规划","完全无计划随心所欲"]},
            {t:"JP", q:"外出出行你会？", o:["提前做好详细规划","临近出发临时安排","只做大致方向规划","走到哪里算哪里"]},
            {t:"JP", q:"个人桌面房间状态？", o:["整洁规整物品定位","随性摆放不拘小节","大致整洁即可","杂乱无章随心放置"]},
            {t:"JP", q:"处理任务习惯？", o:["提前完成绝不拖延","临近截止才着手做","按节奏缓慢推进","拖延到最后一刻"]},
            {t:"JP", q:"每日作息偏向？", o:["作息固定规律稳定","作息灵活随时调整","偶尔规律偶尔随性","毫无固定作息"]},
            {t:"JP", q:"面对突发变动你会？", o:["反感计划被打乱","乐于接受新鲜变化","短暂不适后适应","享受意外改变"]},
            {t:"JP", q:"做出选择时希望？", o:["快速敲定确定结果","慢慢观望延迟决定","犹豫一段时间再选","尽量逃避做决定"]},
            {t:"JP", q:"假期时间如何安排？", o:["提前排满每日行程","边走边玩临时决定","有大致游玩方向","完全随心游玩"]},
            {t:"JP", q:"对待截止日期态度？", o:["紧盯节点提前完工","临近日期全力冲刺","卡着时间点完成","经常临时赶工"]},
            {t:"JP", q:"收纳整理物品频率？", o:["定期整理保持整洁","脏乱后再收拾无定时","很久才整理一次","几乎从不整理"]}
        ];

        // 循环生成 10000 条题库
        for(let i = 0; i < 10000; i++){
            const base = baseQuestions[i % baseQuestions.length];
            const type = base.t;
            let qText = base.q;
            // 简单随机变体，避免题目完全重复
            const randSuffix = ["", "，你认为？", "，你更认同哪一项？", "，你的状态是？"];
            qText += randSuffix[i % randSuffix.length];

            fullQuestionBank.push({
                q: qText,
                o: base.o,
                type: type
            });
        }

        // 随机从数组抽取不重复题目
        function getRandomQuestions(sourceArr, count){
            const arr = [...sourceArr];
            const result = [];
            for(let i = 0; i < count; i++){
                const idx = Math.floor(Math.random() * arr.length);
                result.push(arr.splice(idx, 1)[0]);
            }
            return result;
        }

        // 页面切换
        function switchPage(pageDom) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            pageDom.classList.add('active');
        }

        // 渲染当前题目
        function renderQuestion() {
            const q = randomQuestionList[currentIndex];
            questionNum.innerText = `第 ${currentIndex + 1} 题 / 共 ${NEED_QUESTION} 题`;
            questionTitle.innerText = q.q;
            optionsList.innerHTML = '';

            q.o.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = `option-item ${userAnswers[currentIndex] === idx ? 'active' : ''}`;
                div.innerText = `${String.fromCharCode(65 + idx)}. ${opt}`;
                div.onclick = () => selectOption(idx);
                optionsList.appendChild(div);
            });

            // 更新进度
            const finish = userAnswers.filter(item => item !== null).length;
            const percent = (finish / NEED_QUESTION * 100).toFixed(1);
            progressBar.style.width = `${percent}%`;
            nowNum.innerText = finish;
            progressPercent.innerText = `${percent}%`;

            prevBtn.disabled = currentIndex === 0;
        }

        // 选择选项
        function selectOption(idx) {
            userAnswers[currentIndex] = idx;
            renderQuestion();
        }

        // 计算MBTI结果
        function calcResult() {
            let e = 0, i = 0, s = 0, n = 0, t = 0, f = 0, j = 0, p = 0;
            randomQuestionList.forEach((q, idx) => {
                const ans = userAnswers[idx];
                if(ans === null) return;
                if(q.type === "EI"){
                    ans <=1 ? e++ : i++;
                }else if(q.type === "SN"){
                    ans <=1 ? s++ : n++;
                }else if(q.type === "TF"){
                    ans <=1 ? t++ : f++;
                }else if(q.type === "JP"){
                    ans <=1 ? j++ : p++;
                }
            });

            let ei = e >= i ? "E" : "I";
            let sn = s >= n ? "S" : "N";
            let tf = t >= f ? "T" : "F";
            let jp = j >= p ? "J" : "P";
            const type = ei + sn + tf + jp;

            const res = mbtiResultLib[type];
